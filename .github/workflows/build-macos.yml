name: Build macOS (unsigned)

# On-demand macOS installer build that needs **no Apple Developer account**.
# It ad-hoc-signs the app (required so an arm64 binary will launch at all) but
# does NOT use a Developer ID certificate or notarization — so no secrets are
# needed. The resulting .dmg is uploaded as a workflow artifact (no GitHub
# Release / git tag required).
#
# Gatekeeper will still warn on first open of an unsigned build:
#   right-click → Open, or:  xattr -dr com.apple.quarantine /Applications/CoCodes.app
#
# Run it from the Actions tab → "Build macOS (unsigned)" → Run workflow.

on:
  workflow_dispatch:
    inputs:
      arch:
        description: Which architecture(s) to build
        type: choice
        default: arm64
        options:
          - arm64
          - intel
          - both

jobs:
  # Build the matrix from the chosen arch — the `matrix` context isn't available
  # in a job-level `if:`, so we select legs here instead of filtering later.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          arm='{"arch":"arm64","platform":"macos-latest","target":"aarch64-apple-darwin"}'
          intel='{"arch":"intel","platform":"macos-13","target":"x86_64-apple-darwin"}'
          case "${{ github.event.inputs.arch }}" in
            arm64) inc="[$arm]" ;;
            intel) inc="[$intel]" ;;
            both)  inc="[$arm,$intel]" ;;
            *)     inc="[$arm]" ;;
          esac
          echo "matrix={\"include\":$inc}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build (ad-hoc signed — no Apple Developer account)
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          # `-` forces ad-hoc codesigning so the binary runs; leaving every
          # APPLE_CERTIFICATE / APPLE_ID / notarization var UNSET means Tauri
          # skips Developer ID signing and notarization entirely.
          APPLE_SIGNING_IDENTITY: '-'

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoCodes-macos-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
