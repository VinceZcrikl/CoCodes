name: Release

# Trigger: push a tag like `v0.2.0`, or run manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0) — must match an existing git tag'
        required: true
        type: string
      notes:
        description: 'Changelog / release notes (optional — auto-generated from commits if blank)'
        required: false
        type: string

permissions:
  contents: write   # needed to create / upload GitHub Release assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS Apple Silicon (M1/M2) ──────────────────────────────────
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: '--target aarch64-apple-darwin'

          # ── macOS Intel ──────────────────────────────────────────────────
          - platform: macos-13
            rust-target: x86_64-apple-darwin
            tauri-args: '--target x86_64-apple-darwin'

          # ── Windows x64 ──────────────────────────────────────────────────
          - platform: windows-latest
            rust-target: ''
            tauri-args: ''

          # ── Linux x64 ────────────────────────────────────────────────────
          - platform: ubuntu-22.04
            rust-target: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}
    # Cap every leg so a wedged step (notably macOS `hdiutil`/`bundle_dmg.sh`,
    # which has hung for the full 24h default before) fails fast instead of
    # blocking the whole release and burning a runner for a day.
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags needed for changelog generation

      # ── Node.js ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Rust ───────────────────────────────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── Linux system libs ──────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Frontend ───────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Changelog ─────────────────────────────────────────────────────
      # If `notes` was supplied via workflow_dispatch, use it verbatim.
      # Otherwise auto-generate from commits between the previous tag and
      # this one (requires fetch-depth: 0 on the checkout step above).
      - name: Generate changelog
        id: changelog
        shell: bash
        env:
          CUSTOM_NOTES: ${{ inputs.notes }}
          RELEASE_TAG:  ${{ inputs.tag || github.ref_name }}
        run: |
          if [ -n "$CUSTOM_NOTES" ]; then
            NOTES="$CUSTOM_NOTES"
          else
            git fetch --tags --quiet 2>/dev/null || true
            PREV=$(git tag --sort=-version:refname | grep -v "^${RELEASE_TAG}$" | head -1)
            if [ -n "$PREV" ]; then
              NOTES=$(git log --pretty=format:"- %s" "${PREV}..${RELEASE_TAG}" --)
            fi
            [ -z "$NOTES" ] && NOTES="_No previous release found — initial build._"
          fi
          {
            printf 'NOTES<<NOTES_EOF\n'
            printf '%s\n' "$NOTES"
            printf 'NOTES_EOF\n'
          } >> "$GITHUB_OUTPUT"

      # ── Sync version from git tag ──────────────────────────────────────
      # Strips the leading 'v' and writes the version into the three files
      # that Tauri reads when naming the bundle. pwsh runs on all platforms.
      - name: Sync version from tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          $v = $env:RELEASE_TAG -replace '^v'

          # src-tauri/tauri.conf.json
          $f = 'src-tauri/tauri.conf.json'
          (Get-Content $f -Raw) `
            -replace '"version":\s*"[^"]*"', "`"version`": `"$v`"" |
            Set-Content $f -NoNewline

          # src-tauri/Cargo.toml  (only the [package] line — deps use { version = } syntax)
          $f = 'src-tauri/Cargo.toml'
          $txt = (Get-Content $f -Raw) `
            -replace '(?m)^version = ".*"', "version = `"$v`""
          Set-Content $f $txt -NoNewline

          # package.json
          $f = 'package.json'
          (Get-Content $f -Raw) `
            -replace '"version":\s*"[^"]*"', "`"version`": `"$v`"" |
            Set-Content $f -NoNewline

          Write-Host "Version set to $v"

      # ── macOS signing guard ────────────────────────────────────────────
      # Detect whether valid Apple signing secrets are present.
      # tauri-action aborts if APPLE_CERTIFICATE is non-empty but invalid,
      # so we only forward the signing env vars when ALL five are provided.
      - name: Detect Apple signing secrets
        id: apple-signing
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -n "$CERT" ] && [ -n "$CERT_PASS" ] && [ -n "$IDENTITY" ] && \
             [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASS" ] && [ -n "$TEAM_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Apple signing secrets not set — building unsigned .dmg"
          fi
        env:
          CERT:       ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PASS:  ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IDENTITY:   ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:   ${{ secrets.APPLE_ID }}
          APPLE_PASS: ${{ secrets.APPLE_PASSWORD }}
          TEAM_ID:    ${{ secrets.APPLE_TEAM_ID }}

      # ── macOS DMG flake mitigation ─────────────────────────────────────
      # `bundle_dmg.sh` failed in v0.6.5 seconds after "Running bundle_dmg.sh"
      # — an `hdiutil attach` flake on the runner (a stale/leaked disk image
      # left the mount wedged; the job even had to reap an orphan
      # `diskimages-help`). Detach any disk images left over from a previous
      # attempt so the fresh attach starts clean.
      - name: Detach stale disk images (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          hdiutil info | awk '/^\/dev\/disk/ {print $1}' | while read -r dev; do
            echo "Detaching stale image $dev"
            hdiutil detach "$dev" -force || true
          done

      # ── Build & publish ────────────────────────────────────────────────
      - name: Build Tauri app and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force the bundler's `--skip-jenkins` path so `bundle_dmg.sh` never
          # runs the Finder-prettifying AppleScript, which needs a GUI session
          # the headless runner lacks. The bundler adds the flag only when
          # CI == "true" AND TAURI_BUNDLER_DMG_IGNORE_CI != "true"; pin both so
          # a still-styled DMG can't be one more way the mac leg fails.
          CI: 'true'
          TAURI_BUNDLER_DMG_IGNORE_CI: 'false'
          # Signing vars are only forwarded when the guard step confirmed all
          # six secrets are present. Empty strings tell tauri-action to skip
          # signing rather than attempting an import that would fail.
          # APPLE_SIGNING_IDENTITY is the cert's Common Name, e.g.
          # "Developer ID Application: Your Name (TEAMID)" — Tauri needs it to
          # pick which imported identity to codesign with.
          APPLE_CERTIFICATE:          ${{ steps.apple-signing.outputs.available == 'true' && secrets.APPLE_CERTIFICATE          || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ steps.apple-signing.outputs.available == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY:     ${{ steps.apple-signing.outputs.available == 'true' && secrets.APPLE_SIGNING_IDENTITY     || '' }}
          APPLE_ID:                   ${{ steps.apple-signing.outputs.available == 'true' && secrets.APPLE_ID                   || '' }}
          APPLE_PASSWORD:             ${{ steps.apple-signing.outputs.available == 'true' && secrets.APPLE_PASSWORD             || '' }}
          APPLE_TEAM_ID:              ${{ steps.apple-signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID              || '' }}
          # Updater signing — generates signed artifacts and latest.json for auto-update.
          # Add TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD to
          # GitHub repo secrets. Generate the key pair with:
          #   npx tauri signer generate -w ~/.tauri/cocodes.key
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'CoCodes ${{ inputs.tag || github.ref_name }}'
          releaseBody: |
            ## What's Changed

            ${{ steps.changelog.outputs.NOTES }}

            ---

            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `CoCodes_*_aarch64.dmg` |
            | macOS (Intel) | `CoCodes_*_x64.dmg` |
            | Windows | `CoCodes_*_x64-setup.exe` · `CoCodes_*_x64_en-US.msi` |
            | Linux (Debian/Ubuntu) | `CoCodes_*_amd64.deb` |
            | Linux (Fedora/RHEL) | `CoCodes_*_x86_64.rpm` |
            | Linux (AppImage) | `CoCodes_*_amd64.AppImage` |

            > macOS builds are unsigned unless Apple secrets are configured. If
            > Gatekeeper blocks the app, right-click → Open the first time (or run
            > `xattr -dr com.apple.quarantine /Applications/CoCodes.app`).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri-args }}
