<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoCodes</title>
    <style>
      /* Inline splash — shown before the JS bundle loads; no flicker on launch. */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0e1a;
        z-index: 99999;
        transition: opacity 0.3s ease;
        -webkit-app-region: drag;
      }
      #splash.out { opacity: 0; pointer-events: none; }
      #splash-wordmark {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.75);
        margin-bottom: 20px;
        user-select: none;
      }
      #splash-ring {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: rgba(180, 200, 255, 0.55);
        animation: splash-spin 0.75s linear infinite;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <div id="splash-wordmark">CoCodes</div>
      <div id="splash-ring"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
